  <main>

    <section class="sample-project-section">

      <!-- Ninja API form -->
      <section class="api-form">
        <h3>Ninja API App</h3>
        <form id="api-form">
          <fieldset class="api-choice">
            <p>Pick from the following API's.</p>
            <label>
              <input type="checkbox" class="toggle-checkbox" id="airports-api">
              Airports API
            </label>

            <label>
              <input type="checkbox" class="toggle-checkbox" id="exchange-api">
              Exchange Rate API
            </label>
          </fieldset>

          <label for="api-input" id="api-input-label">
            Choose an API first
          </label>
          <input type="text" id="api-input" placeholder="e.g. JPY or USD_AUD">

          <button type="submit" id="get-response-button"> Get Response</button>
        </form>
        <section id="response-area">
          <h3>API Response</h3>
        </section>
      </section>

    </section>
